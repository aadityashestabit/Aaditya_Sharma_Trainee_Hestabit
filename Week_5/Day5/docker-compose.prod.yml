services:

  backend:
    build: ./backend
    container_name: backend
    restart: always
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api"]
      interval: 30s
      retries: 3

  frontend:
    build: ./frontend
    container_name: frontend
    restart: always

  mongo:
    image: mongo
    restart: always
    volumes:
      - mongo-data:/data/db

  nginx:
    image: nginx
    container_name: nginx
    restart: always
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - backend
      - frontend

volumes:
  mongo-data: