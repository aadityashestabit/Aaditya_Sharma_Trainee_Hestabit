events {}

http {

 server {

    listen 80;

    server_name localhost;

    return 301 https://$host$request_uri;

 }

 server {

    listen 443 ssl;

    ssl_certificate /etc/nginx/certs/localhost.pem;
    ssl_certificate_key /etc/nginx/certs/localhost-key.pem;

    location / {
        return 200 "HTTPS is working";
    }

 }

}